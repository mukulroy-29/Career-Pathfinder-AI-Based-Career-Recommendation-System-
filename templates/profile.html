<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BODY */
body {
  background: linear-gradient(135deg, #e6ebf1, #dbeafe);
  font-family: "Segoe UI", sans-serif;
}

/* NAVBAR */
.premium-navbar {
  background: rgba(13, 27, 61, 0.9);
  backdrop-filter: blur(10px);
  padding: 10px 20px;
}

.premium-navbar .nav-link {
  color: white !important;
  margin-left: 20px;
  font-weight: 500;
  transition: 0.3s;
}

.premium-navbar .nav-link:hover {
  color: #ffd54f !important;
  transform: translateY(-2px);
}

/* PROFILE CONTAINER */
.profile-container {
  max-width: 750px;
  margin: 120px auto;
}

/* PROFILE CARD */
.profile-card {
  background: white;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.profile-card:hover {
  transform: translateY(-5px);
}

/* HEADER */
.profile-header {
  text-align: center;
  margin-bottom: 30px;
}

/* AVATAR */
.profile-avatar {
  width: 100px;
  height: 100px;
  background: linear-gradient(135deg, #0d1b3d, #1e40af);
  color: white;
  font-size: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* INFO */
.profile-info div {
  padding: 14px;
  border-bottom: 1px solid #e5e7eb;
  transition: 0.2s;
}

.profile-info div:hover {
  background: #f8fafc;
}

.label {
  font-weight: 600;
  color: #555;
}

.value {
  float: right;
  color: #111;
}

/* BUTTONS */
.btn-group-custom {
  margin-top: 25px;
  display: flex;
  gap: 10px;
}

.btn-custom {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #0d1b3d;
  color: white;
  transition: 0.3s;
}

.btn-custom:hover {
  background: #145a9c;
  transform: scale(1.03);
}

.logout-btn {
  background: #dc2626;
}

.logout-btn:hover {
  background: #b91c1c;
}

/* RESPONSIVE */
@media (max-width: 576px) {
  .btn-group-custom {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg premium-navbar fixed-top">
  <div class="container-fluid">
    
    <a class="navbar-brand text-white" href="/">Career Predictor</a>

    <div class="ms-auto">
      <a class="nav-link d-inline" href="http://127.0.0.1:5000/user_font">Home</a>
  
   
    <a class="nav-link d-inline" href="http://127.0.0.1:5000/user_career_plan">My career plan</a>
    <a class="nav-link d-inline" href="http://127.0.0.1:5000/user_skill">My skills</a>
<a class="nav-link d-inline" href="http://127.0.0.1:5000/profile">Profile</a>

    </div>

  </div>
</nav>

<!-- PROFILE -->
<div class="profile-container">
  <div class="profile-card">

    <!-- HEADER -->
    <div class="profile-header">
      <div class="profile-avatar">
        {{ user[2][0] if user[2] else 'U' }}
      </div>
      <h3>{{ user[2] }} {{ user[3] }}</h3>
      <p style="color:#6b7280;">Welcome to your dashboard</p>
    </div>

    <!-- INFO -->
    <div class="profile-info">

      <div>
        <span class="label">Full Name</span>
        <span class="value">
          {{ user[2] }} {{ user[3] if user[3] else '' }}
        </span>
      </div>

      <div>
        <span class="label">Email</span>
        <span class="value">{{ user[1] }}</span>
      </div>

    </div>

    <!-- BUTTONS -->
    <div class="btn-group-custom">
      <button class="btn-custom" onclick="location.href='edit_profile'">
        Edit Profile 
      </button>

      <button class="btn-custom" onclick="location.href='/explore_roles'">
        Dashboard 
      </button>

      <button class="btn-custom logout-btn" onclick="location.href='/logout'">
        Logout
      </button>
    </div>

  </div>
</div>

</body>
</html>
