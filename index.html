<!DOCTYPE html>

<style>

/* ================= FIRST PAGE ================= */
.first-page {
  background: #0d1b3d;
  color: white;
  position: relative;

  padding-top: 80px; /*  fix overlap */
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 60px;
  flex-wrap: wrap;
}

.left img {
  width: 100%;
  max-width: 350px;
}

.right {
  width: 45%;
  min-width: 300px;
 
}

/* CARDS */
.card-container {
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
  
}

.card-box {
  position: relative;
  width: 240px;
  padding: 20px;
  border-radius: 18px;

  /* GLASS EFFECT */
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255, 255, 255, 0.2);

  color: white;
  overflow: hidden;

  transition: all 0.4s ease;
}

/* LIGHT REFLECTION (liquid shine) */
.card-box::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.25),
    transparent
  );

  transform: rotate(25deg);
  transition: 0.6s;
}
/* HOVER EFFECT */
.card-box:hover::before {
  left: 100%;
}
.card-box:hover {
  transform: translateY(-10px) scale(1.03);

  border: 1px solid rgba(255,255,255,0.4);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.3),
    0 0 20px rgba(255,255,255,0.1);
}/* TEXT */
.card-box h4 {
  margin-bottom: 8px;
}

.card-box p {
  font-size: 13px;
  opacity: 0.9;
}

/* BUTTON */
.card-box button {
  margin-top: 12px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 8px 16px;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.card-box button:hover {
  background: white;
  color: #0d1b3d;
}


.card-box button {
  background: #1a73e8;
  border: none;
  padding: 8px 15px;
  color: white;
  border-radius: 20px;
}

/* SCROLL BUTTON */
.scroll-btn {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  border-radius: 25px;
  cursor: pointer;
  background: black;
  color: white;
  transition: 0.3s;
}

.hide {
  opacity: 0;
  pointer-events: none;
}


/* FILTER BAR */
.filter-bar{
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
padding:15px 20px;
background:white;
border-radius:12px;
margin:30px;
}

/* LEFT BUTTONS */
.left-filters{

padding:6px 14px;

border:1px solid rgba(255,255,255,0.2);

.filter-btn:hover{
background:gray;
}

.filter-btn.active{
background:white;

}

background:#2979ff;

}

/* ===== AI ANIMATION ===== */

.logo {

}

.logo::before {

/* ANIMATION */

  100% { transform: rotate(405deg); }
}

@keyframes glow {

  50% { box-shadow: 0 0 40px #00eaff; }
  100% { box-shadow: 0 0 10px #00c3ff; }
}
</style>
